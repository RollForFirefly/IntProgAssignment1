<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Shop</title>
  <link rel="stylesheet" href="frontend/style.css">
</head>

<body onload="displayItems()">

  <div class="item-container">
    <h1>🛒One-Stop Shop </h1>
    <h4> Selling everything from overpriced soup to dirt-cheap RAM</h4>
    <button class="cart-btn" onclick="initCatalogue()">Cart</button>

    <div>
      <input type="text" id="taskInput" placeholder="Search for items..." oninput="displayItems()" />
      <ul id="item-list">
        <!-- display all items. later, matching search params-->
      </ul>

    </div>
    <ul id="taskList"></ul>
  </div>

  <script src="frontend/script.js"></script>
</body>

</html>
